name: Config-Label_Sync

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  sync-config:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Load properties
        id: properties
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/export-properties.mjs

      - name: Sync current repo labels into config
        env:
          CONFIG_LABEL_SYNC_TOKEN: ${{ secrets[steps.properties.outputs.label_sync_token_secret_name] }}
          SOURCE_REPOSITORY: ${{ steps.properties.outputs.source_repository }}
        run: node scripts/sync-config-labels.mjs

      - name: Commit config updates
        env:
          PUSH_TOKEN: ${{ secrets[steps.properties.outputs.label_sync_token_secret_name] }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- config/labels.jsonc; then
            echo "No config changes detected."
            exit 0
          fi
          git add config/labels.jsonc
          git commit -m "Sync labels config from source repository"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
